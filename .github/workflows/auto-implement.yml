name: Auto Implement CEO Brief

on:
  workflow_run:
    workflows: ["Daily Agent Council"]
    types: [completed]
  workflow_dispatch:
    inputs:
      brief_date:
        description: "CEO Brief 날짜 (YYYY-MM-DD, 기본: 오늘)"
        required: false

concurrency:
  group: auto-implement
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  models: read
  id-token: write

jobs:
  implement:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── 1. 오늘 CEO Brief 이슈 가져오기 ───────────────────────
      - name: Fetch CEO Brief
        id: brief
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "${{ github.event.inputs.brief_date }}" ]; then
            TODAY="${{ github.event.inputs.brief_date }}"
          else
            TODAY=$(TZ=Asia/Seoul date '+%Y-%m-%d')
          fi
          echo "today=$TODAY" >> "$GITHUB_OUTPUT"

          BRIEF_JSON=$(gh issue list \
            --label "ceo-brief" \
            --state open \
            --limit 5 \
            --json number,title,body \
            --repo "${{ github.repository }}" | \
            jq "[.[] | select(.title | contains(\"$TODAY\"))] | .[0]")

          if [ -z "$BRIEF_JSON" ] || [ "$BRIEF_JSON" = "null" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ $TODAY 날짜의 CEO Brief 이슈를 찾지 못했습니다."
            exit 0
          fi

          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "number=$(echo "$BRIEF_JSON" | jq -r '.number')" >> "$GITHUB_OUTPUT"

          echo "body<<__EOF__" >> "$GITHUB_OUTPUT"
          echo "$BRIEF_JSON" | jq -r '.body' >> "$GITHUB_OUTPUT"
          echo "__EOF__" >> "$GITHUB_OUTPUT"

      # ── 2. 오늘 이미 Auto PR이 있는지 중복 체크 ───────────────
      - name: Check Duplicate PR
        id: dedup
        if: steps.brief.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TODAY: ${{ steps.brief.outputs.today }}
        run: |
          COUNT=$(gh pr list \
            --state open \
            --limit 30 \
            --json title \
            --repo "${{ github.repository }}" | \
            jq "[.[] | select(.title | test(\"\\\\[Auto\\\\].*$TODAY\"))] | length")
          if [ "$COUNT" -gt 0 ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "오늘($TODAY) Auto PR이 이미 존재합니다. 건너뜁니다."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # ── 3. AI로 실행 지시 추출 ────────────────────────────────
      - name: Extract Top Execution Instruction
        id: extract
        if: steps.brief.outputs.found == 'true' && steps.dedup.outputs.exists == 'false'
        uses: actions/ai-inference@v1
        with:
          model: openai/gpt-4o
          system-prompt: |
            당신은 CEO Brief를 파싱하여 개발팀에 전달할 실행 지시를 추출하는 파서입니다.
            반드시 JSON만 반환하세요. 마크다운 코드 블록도 없이, 순수 JSON만.
          prompt: |
            아래 CEO Brief에서 "이번 주 실행 지시" 섹션의 첫 번째 항목만 추출하세요.

            중요 규칙:
            - Kill list, 보류, 무시 항목은 절대 선택하지 마세요.
            - 카카오톡 공유, 사주팔자, 어드민 UI는 절대 선택하지 마세요.
            - 타로앱 UX 몰입감과 관련된 항목을 최우선으로 선택하세요.

            응답 형식 (JSON만, 다른 텍스트 없이):
            {
              "title": "기능 이름 (짧게)",
              "agent": "담당 에이전트",
              "description": "구현 내용 요약 (구체적으로, 3-5문장)",
              "rationale": "선택 이유"
            }

            CEO Brief:
            ${{ steps.brief.outputs.body }}

      # ── 4a. Claude Code로 실제 구현 시도 ──────────────────────
      - name: Implement with Claude Code
        id: claude
        if: steps.brief.outputs.found == 'true' && steps.dedup.outputs.exists == 'false'
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            아래 실행 지시를 구현하세요. 반드시 실제 코드를 작성하고 커밋하세요.

            ## 실행 지시
            ${{ steps.extract.outputs.response }}

            ## 프로젝트 규칙
            - 모노레포 구조: apps/tarot-mobile (React Native + Expo), apps/web (Next.js 14 API), packages/shared (공용 타입), packages/tarot-core (비즈니스 로직)
            - 디자인 토큰: apps/tarot-mobile/constants/theme.ts (Colors, Spacing, Radius)
            - 애니메이션: React Native Animated API만 허용 (react-native-reanimated 사용 금지)
            - Kill list (절대 구현 금지): 카카오톡 공유, 사주팔자, 어드민 UI
            - 모든 코드는 TypeScript로 작성
            - packages/shared/의 기존 타입과 유틸을 최대한 재활용
            - 새 환경변수 추가 시 .env.example에도 반영

            ## 검증
            구현 후 반드시 아래를 통과시키세요:
            1. npm run lint
            2. npm run typecheck
            3. npm run build:web

            lint/typecheck 에러가 있으면 수정하세요.

            ## 커밋
            - 브랜치명: agent/ceo-brief-${{ steps.brief.outputs.today }}
            - 커밋 메시지: "[Auto] ${{ steps.brief.outputs.today }} — {기능명}"
            - PR 제목: "[Auto] ${{ steps.brief.outputs.today }} — {기능명}"
            - PR 본문에 CEO Brief #${{ steps.brief.outputs.number }} 참조 포함

      # ── 4b. Claude Code 실패 시 GitHub Models 폴백 ────────────
      - name: Generate Implementation Plan (fallback)
        id: plan
        if: steps.claude.outcome == 'failure' && steps.brief.outputs.found == 'true' && steps.dedup.outputs.exists == 'false'
        uses: actions/ai-inference@v1
        with:
          model: openai/gpt-4o
          system-prompt: |
            당신은 Trading Taro 앱의 시니어 풀스택 개발자입니다.
            모노레포 구조: apps/tarot-mobile (React Native + Expo), apps/web (Next.js 14 API), packages/shared (공용 타입), packages/tarot-core (비즈니스 로직)
            디자인 토큰: apps/tarot-mobile/constants/theme.ts (Colors, Spacing, Radius)
            애니메이션: React Native Animated API만 허용 (react-native-reanimated 사용 금지)
            Kill list (절대 구현 금지): 카카오톡 공유, 사주팔자, 어드민 UI

            반드시 아래 형식으로만 응답하세요:
            1. 수정할 파일 경로와 변경 내용을 구체적으로
            2. 새로 생성할 파일이 있다면 전체 내용
            3. 모든 코드는 TypeScript로 작성
            4. 기존 패턴과 컨벤션을 따를 것

            응답은 ```diff 또는 ```typescript 코드 블록으로 구성하세요.
            각 파일별로 === FILE: {경로} === 헤더를 붙이세요.
          prompt: |
            아래 실행 지시를 구현하세요.

            ## 실행 지시
            ${{ steps.extract.outputs.response }}

            ## 프로젝트 파일 구조 참고
            현재 레포의 주요 파일들을 참고하여 기존 패턴에 맞게 구현하세요.
            packages/shared/의 기존 타입과 유틸을 최대한 재활용하세요.

      - name: Create Branch and PR (fallback)
        if: steps.claude.outcome == 'failure' && steps.brief.outputs.found == 'true' && steps.dedup.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          PLAN: ${{ steps.plan.outputs.response }}
          INSTRUCTION: ${{ steps.extract.outputs.response }}
          TODAY: ${{ steps.brief.outputs.today }}
          BRIEF_NUMBER: ${{ steps.brief.outputs.number }}
        run: |
          BRANCH="agent/ceo-brief-${TODAY}"

          git config user.name "taro-agent[bot]"
          git config user.email "taro-agent[bot]@users.noreply.github.com"

          git push origin --delete "$BRANCH" 2>&1 || echo "No existing branch to delete"
          git checkout -b "$BRANCH"

          TITLE=$(echo "$INSTRUCTION" | jq -r '.title // "CEO Brief 구현"' 2>/dev/null || echo "CEO Brief 구현")

          mkdir -p docs/auto-implement
          echo "$PLAN" > "docs/auto-implement/${TODAY}-plan.md"

          git add -A
          git commit -m "[Auto] ${TODAY} — ${TITLE}

          CEO Brief #${BRIEF_NUMBER} 기반 자동 구현 (GitHub Models 폴백)
          " || echo "No changes to commit"

          git push origin "$BRANCH" --force 2>&1

          {
            echo "## CEO Brief #${BRIEF_NUMBER} 자동 구현"
            echo ""
            echo "원본 이슈: #${BRIEF_NUMBER}"
            echo ""
            echo "> ⚠️ Claude Code Action 크레딧 부족으로 GitHub Models 폴백 사용"
          } > /tmp/pr-body.md

          gh pr create \
            --title "[Auto] ${TODAY} — ${TITLE}" \
            --body-file /tmp/pr-body.md \
            --base main \
            --head "$BRANCH" \
            --repo "${{ github.repository }}" || {
              echo "gh pr create failed with exit code $?"
              exit 1
            }

      # ── 5. CI 수동 트리거 (GITHUB_TOKEN PR은 CI 자동 트리거 안 됨) ──
      - name: Trigger CI on branch
        if: steps.brief.outputs.found == 'true' && steps.dedup.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          TODAY: ${{ steps.brief.outputs.today }}
        run: |
          BRANCH="agent/ceo-brief-${TODAY}"

          PR_NUM=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' --repo "${{ github.repository }}" 2>/dev/null || echo "")

          if [ -n "$PR_NUM" ]; then
            echo "PR #${PR_NUM} found. Triggering CI on branch: $BRANCH"

            gh workflow run ci.yml \
              --ref "$BRANCH" \
              --field ref="$BRANCH" \
              --repo "${{ github.repository }}" || echo "CI trigger failed (non-critical)"

            IMPL_MODE="Claude Code"
            if [ "${{ steps.claude.outcome }}" = "failure" ]; then
              IMPL_MODE="GitHub Models (폴백)"
            fi

            gh issue comment "${{ steps.brief.outputs.number }}" \
              --repo "${{ github.repository }}" \
              --body "🤖 구현 PR: #${PR_NUM} — ${IMPL_MODE}로 자동 생성됨" || true
          else
            echo "No PR found for branch $BRANCH"
          fi

      # ── 6. 실패 시 CEO Brief 이슈에 코멘트 ───────────────────
      - name: Comment on failure
        if: failure() && steps.brief.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment ${{ steps.brief.outputs.number }} \
            --repo "${{ github.repository }}" \
            --body "⚠️ Auto-implement 실패. [Actions 로그](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) 확인 필요."
