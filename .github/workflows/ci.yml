name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or SHA to check"
        required: false

env:
  NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:4000
  API_PASSWORD: ci-placeholder
  DASHBOARD_PASSWORD: ci-placeholder
  BOT_PASSWORD: ci-placeholder
  FRONTEND_ORIGIN: http://127.0.0.1:3100
  LOCAL_DEMO_MODE: true
  REPORT_PROVIDER: rule-based
  MARKET_DATA_PROVIDER: demo

jobs:
  repo-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || '' }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

  build-api:
    runs-on: ubuntu-latest
    needs: repo-checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || '' }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Build API workspace
        run: npm --workspace @trading/api run build

  build-web:
    runs-on: ubuntu-latest
    needs: repo-checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || '' }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Build web workspace
        run: npm --workspace @trading/web run build
