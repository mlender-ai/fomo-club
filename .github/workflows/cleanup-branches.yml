name: Cleanup Stale Branches

on:
  schedule:
    - cron: "0 3 1 * *"  # 매월 1일 12:00 KST
  workflow_dispatch:
    inputs:
      dry_run:
        description: "미리보기만 (삭제 안 함)"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Delete stale branches without open PRs
        env:
          GH_TOKEN: ${{ github.token }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          DELETED=0
          SKIPPED=0

          for BRANCH in $(git branch -r --merged origin/main | grep -v 'origin/main' | grep -v 'origin/HEAD' | sed 's/origin\///'); do
            OPEN_PRS=$(gh pr list --head "$BRANCH" --state open --json number --repo "${{ github.repository }}" | jq length)
            if [ "$OPEN_PRS" -eq 0 ]; then
              if [ "$DRY_RUN" = "true" ]; then
                echo "[DRY RUN] Would delete: $BRANCH"
              else
                echo "Deleting: $BRANCH"
                gh api "repos/${{ github.repository }}/git/refs/heads/$BRANCH" -X DELETE 2>/dev/null || true
              fi
              DELETED=$((DELETED + 1))
            else
              echo "Skipping (has open PR): $BRANCH"
              SKIPPED=$((SKIPPED + 1))
            fi
          done

          echo "## Branch Cleanup Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- Deleted: $DELETED" >> "$GITHUB_STEP_SUMMARY"
          echo "- Skipped (open PRs): $SKIPPED" >> "$GITHUB_STEP_SUMMARY"
