name: Daily Morning Report

on:
  schedule:
    - cron: "30 22 * * *"  # 매일 07:30 KST — 에이전트 카운슬(07:00) 완료 후 30분
  workflow_dispatch:       # 수동 테스트용

permissions:
  issues: read
  models: read

jobs:
  send_report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── 1. 오늘 생성된 CEO Brief 이슈 가져오기 ─────────────────
      - name: Fetch Today's CEO Brief
        id: brief
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TODAY=$(TZ=Asia/Seoul date '+%Y-%m-%d')

          # 오늘 날짜가 제목에 포함된 CEO Brief 이슈 검색
          ISSUE_JSON=$(gh issue list \
            --label "ceo-brief" \
            --state open \
            --limit 10 \
            --json number,title,body,createdAt \
            --repo "${{ github.repository }}" | \
            jq "[.[] | select(.title | contains(\"$TODAY\"))] | .[0]")

          if [ "$ISSUE_JSON" = "null" ] || [ -z "$ISSUE_JSON" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "number=$(echo "$ISSUE_JSON" | jq -r '.number')" >> "$GITHUB_OUTPUT"
          echo "title=$(echo "$ISSUE_JSON" | jq -r '.title')" >> "$GITHUB_OUTPUT"

          # 멀티라인 body는 heredoc으로 전달
          echo "body<<__EOF__" >> "$GITHUB_OUTPUT"
          echo "$ISSUE_JSON" | jq -r '.body' >> "$GITHUB_OUTPUT"
          echo "__EOF__" >> "$GITHUB_OUTPUT"

      # ── 2. Shell HTML 변환 (GitHub Models API 429 우회) ──────────
      - name: Convert Markdown to HTML
        if: steps.brief.outputs.found == 'true'
        id: email_html
        env:
          BODY: ${{ steps.brief.outputs.body }}
          ISSUE_NUM: ${{ steps.brief.outputs.number }}
        run: |
          printenv BODY > /tmp/body.md

          {
            echo '<div style="max-width:640px;margin:0 auto;font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0f0f0f;color:#e0e0e0;padding:20px;font-size:14px;line-height:1.7">'
            echo '<div style="text-align:center;padding:20px 0;border-bottom:1px solid #333">'
            echo '<span style="font-size:28px">🔮</span>'
            echo '<h1 style="color:#3ecf8e;font-size:20px;margin:8px 0 4px">Trading Taro CEO Brief</h1>'
            echo '<p style="color:#888;font-size:13px;margin:0">'"$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')"'</p>'
            echo '</div>'

            sed \
              -e 's|^## 🚨\(.*\)|<div style="border-radius:12px;padding:16px;margin:16px 0;background:#1e1e1e;border-left:3px solid #e07b3e"><h2 style="color:#e07b3e;font-size:17px;margin:0 0 12px">\1</h2>|' \
              -e 's|^### 🚨\(.*\)|<div style="border-radius:12px;padding:16px;margin:16px 0;background:#1e1e1e;border-left:3px solid #e07b3e"><h3 style="color:#e07b3e;font-size:16px;margin:0 0 12px">🚨\1</h3>|' \
              -e 's|^## 📋\(.*\)|</div><div style="border-radius:12px;padding:16px;margin:16px 0;background:#1e1e1e;border-left:3px solid #3ecf8e"><h2 style="color:#3ecf8e;font-size:17px;margin:0 0 12px">📋\1</h2>|' \
              -e 's|^### 📋\(.*\)|</div><div style="border-radius:12px;padding:16px;margin:16px 0;background:#1e1e1e;border-left:3px solid #3ecf8e"><h3 style="color:#3ecf8e;font-size:16px;margin:0 0 12px">📋\1</h3>|' \
              -e 's|^## ⚔️\(.*\)|</div><div style="border-radius:12px;padding:16px;margin:16px 0;background:#1e1e1e;border-left:3px solid #e07b3e"><h2 style="color:#e07b3e;font-size:17px;margin:0 0 12px">⚔️\1</h2>|' \
              -e 's|^### ⚔️\(.*\)|</div><div style="border-radius:12px;padding:16px;margin:16px 0;background:#1e1e1e;border-left:3px solid #e07b3e"><h3 style="color:#e07b3e;font-size:16px;margin:0 0 12px">⚔️\1</h3>|' \
              -e 's|^## 💡\(.*\)|</div><div style="border-radius:12px;padding:16px;margin:16px 0;background:#1e1e1e;border-left:3px solid #3ecf8e"><h2 style="color:#3ecf8e;font-size:17px;margin:0 0 12px">💡\1</h2>|' \
              -e 's|^### 💡\(.*\)|</div><div style="border-radius:12px;padding:16px;margin:16px 0;background:#1e1e1e;border-left:3px solid #3ecf8e"><h3 style="color:#3ecf8e;font-size:16px;margin:0 0 12px">💡\1</h3>|' \
              -e 's|^## 🗑️\(.*\)|</div><div style="border-radius:12px;padding:16px;margin:16px 0;background:#1e1e1e;border-left:3px solid #888"><h2 style="color:#888;font-size:17px;margin:0 0 12px">🗑️\1</h2>|' \
              -e 's|^### 🗑️\(.*\)|</div><div style="border-radius:12px;padding:16px;margin:16px 0;background:#1e1e1e;border-left:3px solid #888"><h3 style="color:#888;font-size:16px;margin:0 0 12px">🗑️\1</h3>|' \
              -e 's|^## 📊\(.*\)|</div><div style="border-radius:12px;padding:16px;margin:16px 0;background:#1e1e1e;border-left:3px solid #3ecf8e"><h2 style="color:#3ecf8e;font-size:17px;margin:0 0 12px">📊\1</h2>|' \
              -e 's|^### 📊\(.*\)|</div><div style="border-radius:12px;padding:16px;margin:16px 0;background:#1e1e1e;border-left:3px solid #3ecf8e"><h3 style="color:#3ecf8e;font-size:16px;margin:0 0 12px">📊\1</h3>|' \
              -e 's|^## 🔭\(.*\)|</div><div style="border-radius:12px;padding:16px;margin:16px 0;background:#1e1e1e;border-left:3px solid #3ecf8e"><h2 style="color:#3ecf8e;font-size:17px;margin:0 0 12px">🔭\1</h2>|' \
              -e 's|^### 🔭\(.*\)|</div><div style="border-radius:12px;padding:16px;margin:16px 0;background:#1e1e1e;border-left:3px solid #3ecf8e"><h3 style="color:#3ecf8e;font-size:16px;margin:0 0 12px">🔭\1</h3>|' \
              -e 's|^## \(.*\)|</div><div style="border-radius:12px;padding:16px;margin:16px 0;background:#1e1e1e;border-left:3px solid #3ecf8e"><h2 style="color:#3ecf8e;font-size:17px;margin:0 0 12px">\1</h2>|' \
              -e 's|^### \(.*\)|<h3 style="color:#e0e0e0;font-size:15px;margin:12px 0 8px">\1</h3>|' \
              -e 's|^#### \(.*\)|<h4 style="color:#ccc;font-size:14px;margin:10px 0 6px">\1</h4>|' \
              -e 's|^\*\*\[CRITICAL\]\(.*\)\*\*|<span style="background:#e07b3e;color:#fff;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:bold">CRITICAL</span> <strong>\1</strong>|' \
              -e 's|^\*\*\[HIGH\]\(.*\)\*\*|<span style="background:#e0c13e;color:#000;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:bold">HIGH</span> <strong>\1</strong>|' \
              -e 's|\*\*\([^*]*\)\*\*|<strong style="color:#fff">\1</strong>|g' \
              -e 's|^- \[ \] \(.*\)|<div style="padding:4px 0">☐ \1</div>|' \
              -e 's|^- \[x\] \(.*\)|<div style="padding:4px 0;color:#3ecf8e">☑ \1</div>|' \
              -e 's|^- \(.*\)|<div style="padding:3px 0;padding-left:12px">• \1</div>|' \
              -e 's|^> \(.*\)|<div style="border-left:3px solid #555;padding-left:12px;color:#aaa;margin:8px 0">\1</div>|' \
              -e 's|^---$|<hr style="border:none;border-top:1px solid #333;margin:16px 0">|' \
              -e 's|^|<div>|;s|$|</div>|' \
              -e 's|^<div></div>$||' \
              /tmp/body.md

            # 마크다운 테이블 → HTML 테이블 (간이 변환)
            # 테이블은 sed로 한계가 있으므로 기본 스타일만 적용

            echo '</div>'
            echo '<div style="text-align:center;padding:20px 0;border-top:1px solid #333;margin-top:20px">'
            echo '<a href="https://github.com/${{ github.repository }}/issues/'"$ISSUE_NUM"'" style="color:#3ecf8e;text-decoration:none;font-size:13px">GitHub 이슈에서 전체 보기 →</a>'
            echo '<p style="color:#555;font-size:11px;margin-top:8px">Trading Taro Agent Council</p>'
            echo '</div></div>'
          } > /tmp/email.html

          echo "response<<__HTML_EOF__" >> "$GITHUB_OUTPUT"
          cat /tmp/email.html >> "$GITHUB_OUTPUT"
          echo "__HTML_EOF__" >> "$GITHUB_OUTPUT"

      # ── 3. 이메일 발송 ────────────────────────────────────────
      - name: Send Morning Report Email
        if: steps.brief.outputs.found == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "🔮 [${{ steps.brief.outputs.title }}]"
          to: ${{ secrets.REPORT_EMAIL }}
          from: "Trading Taro 에이전트 카운슬 <${{ secrets.SMTP_USERNAME }}>"
          html_body: ${{ steps.email_html.outputs.response }}

      # ── 4. 이슈 없을 때 알림 ─────────────────────────────────
      - name: Send Fallback Email (no brief found)
        if: steps.brief.outputs.found == 'false'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "⚠️ [Trading Taro] 오늘 CEO Brief 이슈가 생성되지 않았습니다"
          to: ${{ secrets.REPORT_EMAIL }}
          from: "Trading Taro 에이전트 카운슬 <${{ secrets.SMTP_USERNAME }}>"
          body: |
            오늘(${{ env.TODAY }}) CEO Brief 이슈를 찾을 수 없습니다.

            에이전트 카운슬 워크플로우가 정상 실행됐는지 확인하세요:
            https://github.com/${{ github.repository }}/actions/workflows/idea-proposal.yml
