name: Deploy to Vercel

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-vercel.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # ── 1. 프로젝트 조회/생성 + 모노레포 설정 ──────────────────
      #
      #   핵심: npm workspaces 모노레포에서 rootDirectory=apps/web 만으로는
      #   원격 빌드가 루트 lockfile / 워크스페이스 패키지(@trading/shared,
      #   @taro/core)에 접근 불가 → 빌드 실패. sourceFilesOutsideRootDirectory
      #   를 true 로 켜야 전체 레포가 업로드되어 빌드 가능.
      #
      - name: Configure Vercel project
        run: |
          api() { curl -s --max-time 30 -H "Authorization: Bearer $VERCEL_TOKEN" "$@"; }

          ORG_ID=$(api "https://api.vercel.com/v2/user" | jq -r '.user.id // .id // empty')
          if [ -z "$ORG_ID" ]; then
            echo "::error::Vercel 사용자 조회 실패 — VERCEL_TOKEN 확인"; exit 1
          fi
          echo "VERCEL_ORG_ID=$ORG_ID" >> "$GITHUB_ENV"
          echo "ORG_ID=$ORG_ID"

          PROJ_ID=$(api "https://api.vercel.com/v9/projects/taro-stock-web" | jq -r '.id // empty')
          if [ -z "$PROJ_ID" ]; then
            PROJ_ID=$(api -X POST "https://api.vercel.com/v10/projects" \
              -H "Content-Type: application/json" \
              -d '{"name":"taro-stock-web","framework":"nextjs","rootDirectory":"apps/web"}' \
              | jq -r '.id // empty')
            echo "프로젝트 생성 → $PROJ_ID"
          else
            echo "기존 프로젝트 → $PROJ_ID"
          fi
          if [ -z "$PROJ_ID" ]; then
            echo "::error::프로젝트 조회/생성 실패"; exit 1
          fi
          echo "VERCEL_PROJECT_ID=$PROJ_ID" >> "$GITHUB_ENV"

          # 모노레포 빌드 설정 (auto-detect + 외부 파일 포함)
          CODE=$(api -o /dev/null -w "%{http_code}" \
            -X PATCH "https://api.vercel.com/v9/projects/$PROJ_ID" \
            -H "Content-Type: application/json" \
            -d '{
              "framework":"nextjs",
              "rootDirectory":"apps/web",
              "sourceFilesOutsideRootDirectory":true,
              "installCommand":null,
              "buildCommand":null,
              "outputDirectory":".next-build"
            }')
          echo "설정 PATCH HTTP $CODE"

      # ── 2. 런타임 환경변수 동기화 (Slack 엔드포인트용) ─────────
      - name: Sync environment variables
        env:
          SLACK_BOT_TOKEN:      ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
          GH_PAT_VAL:           ${{ secrets.GH_PAT }}
          AI_API_KEY:           ${{ secrets.AI_API_KEY }}
          JWT_SECRET:           ${{ secrets.JWT_SECRET }}
          DATABASE_URL:         ${{ secrets.DATABASE_URL }}
        run: |
          sync_env() {
            local key=$1 val=$2
            [ -z "$val" ] && return
            CODE=$(curl -s --max-time 30 -o /dev/null -w "%{http_code}" -X POST \
              "https://api.vercel.com/v10/projects/$VERCEL_PROJECT_ID/env?upsert=true" \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg k "$key" --arg v "$val" \
                '{key:$k,value:$v,type:"encrypted",target:["production","preview","development"]}')")
            echo "  $key → HTTP $CODE"
          }
          sync_env SLACK_BOT_TOKEN      "$SLACK_BOT_TOKEN"
          sync_env SLACK_SIGNING_SECRET "$SLACK_SIGNING_SECRET"
          sync_env GITHUB_PAT           "$GH_PAT_VAL"
          sync_env GITHUB_REPO          "mlender-ai/taro-stock-app"
          sync_env AI_API_URL           "https://models.github.ai/inference/chat/completions"
          sync_env AI_API_KEY           "$AI_API_KEY"
          sync_env AI_MODEL             "openai/gpt-4.1"
          sync_env JWT_SECRET           "$JWT_SECRET"
          sync_env DATABASE_URL         "$DATABASE_URL"

      # ── 3. 원격 빌드 배포 ──────────────────────────────────────
      #    VERCEL_ORG_ID / VERCEL_PROJECT_ID 가 env 에 있으므로
      #    대화형 링크 없이 해당 프로젝트로 배포됨.
      #    sourceFilesOutsideRootDirectory=true 라 전체 레포 업로드.
      - name: Deploy
        id: deploy
        run: |
          OUT=$(npx --yes vercel@latest deploy --prod --yes \
            --token "$VERCEL_TOKEN" 2>&1)
          echo "$OUT"
          URL=$(echo "$OUT" | grep -Eo "https://[a-zA-Z0-9.-]+\.vercel\.app" | tail -1)
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          if [ -z "$URL" ]; then
            echo "::error::배포 URL 없음 — 빌드 실패 (위 로그 확인)"; exit 1
          fi
          echo "DEPLOYED → $URL"

      # ── 4. Slack 알림 ──────────────────────────────────────────
      - name: Notify Slack
        if: vars.SLACK_WEBHOOK_URL != '' && steps.deploy.outputs.url != ''
        env:
          SLACK_WEBHOOK_URL: ${{ vars.SLACK_WEBHOOK_URL }}
        run: |
          PAYLOAD=$(jq -n \
            --arg text "🚀 *Vercel 배포 완료*\n>https://taro-stock-web.vercel.app\n\nSlack Slash Command URL:\n>https://taro-stock-web.vercel.app/api/slack/commands\nEvent URL:\n>https://taro-stock-web.vercel.app/api/slack/events" \
            '{"text": $text}')
          curl -sf -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" -d "$PAYLOAD" || true
