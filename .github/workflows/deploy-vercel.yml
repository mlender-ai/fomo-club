name: Deploy to Vercel

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/**"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

permissions:
  contents: read

env:
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ── 루트에서 workspace 의존성 설치 ─────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 배포 (프로젝트 없으면 자동 생성) ───────────────────────
      - name: Deploy to Vercel
        id: deploy
        working-directory: apps/web
        run: |
          DEPLOY_OUTPUT=$(npx vercel deploy --prod --yes \
            --token "$VERCEL_TOKEN" 2>&1)
          echo "$DEPLOY_OUTPUT"
          DEPLOY_URL=$(echo "$DEPLOY_OUTPUT" | grep -E "^https://" | tail -1)
          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"

      # ── 환경변수 동기화 (최초 배포 후 자동 설정) ───────────────
      - name: Sync environment variables
        working-directory: apps/web
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
          GITHUB_PAT: ${{ secrets.GH_PAT }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          upsert() {
            local key=$1 val=$2
            [ -z "$val" ] && return
            # add 실패(이미 있음) → force 덮어쓰기
            echo "$val" | npx vercel env add "$key" production \
              --token "$VERCEL_TOKEN" --yes 2>/dev/null || \
            echo "$val" | npx vercel env add "$key" production \
              --token "$VERCEL_TOKEN" --yes --force 2>/dev/null || true
          }
          upsert SLACK_BOT_TOKEN      "$SLACK_BOT_TOKEN"
          upsert SLACK_SIGNING_SECRET "$SLACK_SIGNING_SECRET"
          upsert GITHUB_PAT           "$GITHUB_PAT"
          upsert GITHUB_REPO          "mlender-ai/taro-stock-app"
          upsert AI_API_URL           "https://models.github.ai/inference/chat/completions"
          upsert AI_API_KEY           "$AI_API_KEY"
          upsert AI_MODEL             "openai/gpt-4.1"
          upsert JWT_SECRET           "$JWT_SECRET"
          upsert DATABASE_URL         "$DATABASE_URL"

      # ── Slack 배포 완료 알림 ────────────────────────────────────
      - name: Notify Slack
        if: vars.SLACK_WEBHOOK_URL != '' && steps.deploy.outputs.url != ''
        env:
          SLACK_WEBHOOK_URL: ${{ vars.SLACK_WEBHOOK_URL }}
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
        run: |
          PAYLOAD=$(jq -n \
            --arg text "🚀 *Vercel 배포 완료*\n>${DEPLOY_URL}" \
            '{"text": $text}')
          curl -sf -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || true
