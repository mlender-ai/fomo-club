name: Deploy to Vercel

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-vercel.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # ── 1. 프로젝트 조회/생성 + 설정 리셋 ──────────────────────
      #    잘못된 installCommand("cd ../.. && npm ci")를 null로 초기화하여
      #    Vercel 네이티브 npm-workspace 감지(루트 lockfile)로 설치되도록 함.
      - name: Resolve & configure Vercel project
        run: |
          ORG_ID=$(curl -sf "https://api.vercel.com/v2/user" \
            -H "Authorization: Bearer $VERCEL_TOKEN" | jq -r '.user.id')
          echo "VERCEL_ORG_ID=$ORG_ID" >> "$GITHUB_ENV"

          PROJ=$(curl -s "https://api.vercel.com/v9/projects/taro-stock-web" \
            -H "Authorization: Bearer $VERCEL_TOKEN")
          PROJ_ID=$(echo "$PROJ" | jq -r '.id // empty')

          if [ -z "$PROJ_ID" ]; then
            PROJ=$(curl -sf "https://api.vercel.com/v10/projects" \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"name":"taro-stock-web","framework":"nextjs","rootDirectory":"apps/web"}')
            PROJ_ID=$(echo "$PROJ" | jq -r '.id')
            echo "프로젝트 생성됨: $PROJ_ID"
          else
            echo "기존 프로젝트: $PROJ_ID"
          fi
          echo "VERCEL_PROJECT_ID=$PROJ_ID" >> "$GITHUB_ENV"

          # 설정을 기본값으로 리셋 (커스텀 install/build 명령 제거)
          curl -sf -X PATCH "https://api.vercel.com/v9/projects/$PROJ_ID" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"framework":"nextjs","rootDirectory":"apps/web","installCommand":null,"buildCommand":null,"devCommand":null,"outputDirectory":".next-build"}' \
            > /dev/null
          echo "프로젝트 설정 리셋 완료"

      # ── 2. 환경변수 동기화 (REST API upsert) ───────────────────
      - name: Sync environment variables
        env:
          SLACK_BOT_TOKEN:      ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
          GH_PAT_VAL:           ${{ secrets.GH_PAT }}
          AI_API_KEY:           ${{ secrets.AI_API_KEY }}
          JWT_SECRET:           ${{ secrets.JWT_SECRET }}
          DATABASE_URL:         ${{ secrets.DATABASE_URL }}
        run: |
          sync_env() {
            local key=$1 val=$2
            [ -z "$val" ] && return
            curl -s -X POST \
              "https://api.vercel.com/v10/projects/$VERCEL_PROJECT_ID/env?upsert=true" \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg k "$key" --arg v "$val" \
                '{key:$k,value:$v,type:"encrypted",target:["production","preview","development"]}')" \
              > /dev/null && echo "  ✓ $key"
          }
          sync_env SLACK_BOT_TOKEN      "$SLACK_BOT_TOKEN"
          sync_env SLACK_SIGNING_SECRET "$SLACK_SIGNING_SECRET"
          sync_env GITHUB_PAT           "$GH_PAT_VAL"
          sync_env GITHUB_REPO          "mlender-ai/taro-stock-app"
          sync_env AI_API_URL           "https://models.github.ai/inference/chat/completions"
          sync_env AI_API_KEY           "$AI_API_KEY"
          sync_env AI_MODEL             "openai/gpt-4.1"
          sync_env JWT_SECRET           "$JWT_SECRET"
          sync_env DATABASE_URL         "$DATABASE_URL"

      # ── 3. 원격 빌드 배포 (레포 루트에서 업로드) ───────────────
      #    --prebuilt 없이 → Vercel이 원격에서 빌드.
      #    rootDirectory=apps/web 가 프로젝트에 설정되어 있으므로
      #    루트 lockfile로 workspace 설치 후 apps/web 빌드.
      - name: Deploy
        id: deploy
        run: |
          OUTPUT=$(npx --yes vercel@latest deploy --prod --yes \
            --token "$VERCEL_TOKEN" 2>&1)
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | grep -Eo "https://[a-zA-Z0-9.-]+\.vercel\.app" | tail -1)
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          if [ -z "$URL" ]; then
            echo "::error::배포 URL을 찾을 수 없음 — 배포 실패"
            exit 1
          fi
          echo "배포 완료: $URL"

      # ── 4. Slack 알림 ──────────────────────────────────────────
      - name: Notify Slack
        if: vars.SLACK_WEBHOOK_URL != '' && steps.deploy.outputs.url != ''
        env:
          SLACK_WEBHOOK_URL: ${{ vars.SLACK_WEBHOOK_URL }}
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
        run: |
          PAYLOAD=$(jq -n \
            --arg text "🚀 *Vercel 배포 완료*\n>${DEPLOY_URL}\n\nSlack Slash Command URL:\n>${DEPLOY_URL}/api/slack/commands" \
            '{"text": $text}')
          curl -sf -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || true
