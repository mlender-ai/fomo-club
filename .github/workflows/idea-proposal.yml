name: Daily Idea Proposals

on:
  schedule:
    - cron: "0 22 * * *"  # 매일 오전 7시 KST (UTC 22:00 전날)
  workflow_dispatch:
    inputs:
      agent:
        description: "실행할 에이전트 (all / planner / prompt-engineer / rn-specialist / security-reviewer)"
        required: false
        default: "all"

concurrency:
  group: idea-proposal
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  models: read

jobs:
  planner:
    if: ${{ github.event.inputs.agent == 'all' || github.event.inputs.agent == 'planner' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "[Planner] 신규 기능 아이디어 제안"
        uses: actions/ai-inference@v1
        id: proposal
        with:
          model: openai/gpt-4o
          system: |
            당신은 타로 증권 앱(React Native + Expo, Next.js 백엔드)의 기획 에이전트입니다.
            앱의 핵심 가치: 주식 시장 데이터를 타로 카드로 해석해 감성적 투자 인사이트 제공.
            현재 구현된 기능: 카드 뽑기(1장/3장), 소셜 로그인(Apple/Google), 크레딧 시스템(IAP/광고), 히스토리/분석, 즐겨찾기, 어드민 패널.
            사용자 페르소나: MZ세대 개인 투자자, 타로에 관심 있는 주식 입문자.
          prompt: |
            현재 앱 상태를 분석하고, 다음 스프린트에 구현하면 좋을 신규 기능 아이디어 1개를 제안하세요.
            다음 형식으로 작성하세요:

            ## 🎴 기능명
            (간결한 이름)

            ## 배경
            (왜 이 기능이 필요한가 — 사용자 문제 또는 성장 기회)

            ## 구현 방향
            (핵심 구현 방법, 예상 파일/API, 2-3문장)

            ## 예상 임팩트
            (유저 리텐션 / 크레딧 소비 / 신규 유입 등 KPI 관점)

            ## 난이도
            (S/M/L + 이유 한 줄)

      - name: Create Issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "[Planner] $(date '+%Y-%m-%d') 기능 제안" \
            --body "${{ steps.proposal.outputs.response }}" \
            --label "idea,planner" \
            --repo "${{ github.repository }}"

  prompt-engineer:
    if: ${{ github.event.inputs.agent == 'all' || github.event.inputs.agent == 'prompt-engineer' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "[Prompt Engineer] 해석 프롬프트 개선 제안"
        uses: actions/ai-inference@v1
        id: proposal
        with:
          model: openai/gpt-4o
          system: |
            당신은 타로 증권 앱의 AI 해석 품질을 담당하는 프롬프트 엔지니어 에이전트입니다.
            현재 구조: packages/tarot-core/src/prompts/interpret-v1.0.0.ts 에 프롬프트 정의.
            3단 폴백: LLM → 캐시 → 사전 빌드 fallback.
            안전 필터: 매수/매도/수익보장 등 금융 권유 표현 차단.
            출력 형식: {headline, summary, detail} JSON.
          prompt: |
            현재 타로 카드 해석 프롬프트를 개선하거나, 새로운 프롬프트 버전(v1.1.0 등)을 도입할 아이디어를 제안하세요.
            다음 형식으로 작성하세요:

            ## ✨ 프롬프트 개선 제안

            ## 현재 문제 또는 기회
            (해석 품질, 사용자 반응, 안전 필터 충돌 등)

            ## 개선 방향
            (구체적 프롬프트 전략 또는 파라미터 변경)

            ## 예상 샘플 출력
            (개선 전 / 개선 후 비교, 간략하게)

            ## 검증 방법
            (A/B 테스트, 폴백률 측정 등)

      - name: Create Issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "[Prompt Engineer] $(date '+%Y-%m-%d') 프롬프트 개선 제안" \
            --body "${{ steps.proposal.outputs.response }}" \
            --label "idea,prompt" \
            --repo "${{ github.repository }}"

  rn-specialist:
    if: ${{ github.event.inputs.agent == 'all' || github.event.inputs.agent == 'rn-specialist' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "[RN Specialist] 모바일 UX/성능 개선 제안"
        uses: actions/ai-inference@v1
        id: proposal
        with:
          model: openai/gpt-4o
          system: |
            당신은 타로 증권 앱의 React Native / Expo 전문 에이전트입니다.
            스택: Expo SDK 54, expo-router, zustand, NativeWind, react-native-reanimated.
            현재 화면: 홈(카드 뽑기), 히스토리, 프로필(크레딧/IAP), 즐겨찾기, 온보딩.
            타겟: iOS/Android 네이티브 앱.
          prompt: |
            모바일 UX, 애니메이션, 성능, 접근성 관점에서 개선할 아이디어 1개를 제안하세요.
            다음 형식으로 작성하세요:

            ## 📱 모바일 UX 개선 제안

            ## 현재 문제
            (사용자가 겪을 수 있는 UX/성능 이슈)

            ## 개선 방안
            (구체적 구현: 컴포넌트, 애니메이션, 제스처 등)

            ## 참고 라이브러리 또는 Expo API
            (활용할 패키지나 API)

            ## 예상 효과
            (리텐션, 평점, 성능 지표)

      - name: Create Issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "[RN Specialist] $(date '+%Y-%m-%d') 모바일 UX 개선 제안" \
            --body "${{ steps.proposal.outputs.response }}" \
            --label "idea,mobile" \
            --repo "${{ github.repository }}"

  security-reviewer:
    if: ${{ github.event.inputs.agent == 'all' || github.event.inputs.agent == 'security-reviewer' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "[Security] 보안/컴플라이언스 점검 제안"
        uses: actions/ai-inference@v1
        id: proposal
        with:
          model: openai/gpt-4o
          system: |
            당신은 타로 증권 앱의 보안 및 규정 준수 담당 에이전트입니다.
            앱은 금융 관련 AI 해석 서비스이며 Apple/Google 소셜 로그인, IAP, 크레딧 시스템을 포함합니다.
            주요 보안 고려사항: JWT 토큰 관리, 영수증 검증(RevenueCat), 개인정보 처리, 금융 광고 규제.
          prompt: |
            현재 앱에서 점검하거나 강화해야 할 보안/컴플라이언스 항목 1개를 제안하세요.
            다음 형식으로 작성하세요:

            ## 🔒 보안/컴플라이언스 점검 제안

            ## 위험 항목
            (구체적 취약점 또는 규제 요건)

            ## 현재 상태
            (코드 어디서 해당 이슈가 발생할 수 있는지)

            ## 개선 방안
            (코드/설정/프로세스 레벨 개선)

            ## 우선순위
            (High/Medium/Low + 이유)

      - name: Create Issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "[Security] $(date '+%Y-%m-%d') 보안 점검 제안" \
            --body "${{ steps.proposal.outputs.response }}" \
            --label "idea,security" \
            --repo "${{ github.repository }}"
