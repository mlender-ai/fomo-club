name: Quality SLO Monitor

on:
  schedule:
    - cron: "35 21 * * *" # 06:35 KST, committee editor and quality cron 이후
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Expose latest committee run report
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          URL="https://fomo-club-backend.vercel.app/api/fomo/committee-report?limit=3"
          if [ -n "${CRON_SECRET:-}" ]; then
            curl -fsS "$URL" -H "Authorization: Bearer ${CRON_SECRET}" > /tmp/committee-report.json
          else
            curl -fsS "$URL" > /tmp/committee-report.json
          fi
          node - <<'NODE'
          const fs = require("fs");
          const result = JSON.parse(fs.readFileSync("/tmp/committee-report.json", "utf8"));
          const run = result.runs?.[0];
          if (!result.ok || !run) {
            console.log("::warning title=Committee report::No committee run report is available");
            process.exit(0);
          }
          const line = `${run.date} ${run.status} stage=${run.stage ?? "unknown"} step=${run.failureStep ?? "-"} calls=${run.callCount} candidates=${run.candidateCount} selected=${run.selectedCount}${run.error ? ` error=${run.error}` : ""}`;
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `## Committee run\n\n${line}\n`);
          console.log(line);
          if (run.status === "failed") console.log(`::warning title=Committee failed::${line}`);
          NODE

      - name: Materialize and read latest quality row
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          URL="https://fomo-club-backend.vercel.app/api/fomo/cron/quality-slo"
          if [ -n "${CRON_SECRET:-}" ]; then
            curl -fsS "$URL" -H "Authorization: Bearer ${CRON_SECRET}" > /tmp/quality-slo.json
          else
            curl -fsS "$URL" > /tmp/quality-slo.json
          fi

      - name: Enforce fixed SLO targets
        run: |
          node - <<'NODE'
          const fs = require("fs");
          const result = JSON.parse(fs.readFileSync("/tmp/quality-slo.json", "utf8"));
          const latest = result.latest;
          if (!result.ok || !latest) {
            console.log("::error title=Quality SLO ledger::Latest quality row is unavailable");
            process.exit(1);
          }
          const failures = Array.isArray(latest.failures) ? latest.failures : [];
          const summary = `${latest.date}: ${latest.passed ? "PASS" : `FAIL (${failures.join(", ")})`}`;
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `## Quality SLO\n\n${summary}\n`);
          if (!latest.passed) {
            console.log(`::warning title=Quality SLO missed::${summary}`);
            process.exit(1);
          }
          console.log(summary);
          NODE
