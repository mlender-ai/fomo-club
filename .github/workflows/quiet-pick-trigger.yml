name: Quiet Pick Trigger

# 조용한 돈 픽(WO-G1A) 수동 실측: 크론을 트리거해 발행 → GET 결과를 스텝 요약에 덤프.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger quiet-pick cron and fetch result
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          BASE="https://fomo-club-backend.vercel.app"
          AUTH=()
          if [ -n "${CRON_SECRET:-}" ]; then AUTH=(-H "Authorization: Bearer ${CRON_SECRET}"); fi

          echo "== triggering cron /api/fomo/cron/quiet-pick =="
          curl -fsS --max-time 290 "${AUTH[@]}" "$BASE/api/fomo/cron/quiet-pick" > /tmp/cron.json || { echo "cron call failed"; cat /tmp/cron.json || true; exit 1; }
          cat /tmp/cron.json

          echo "== fetching GET /api/fomo/quiet-picks =="
          # 크론이 방금 revalidateTag 했지만 CDN 반영 여유를 두고 캐시 우회.
          curl -fsS --max-time 60 "$BASE/api/fomo/quiet-picks?cb=$RANDOM" > /tmp/picks.json || { echo "get failed"; cat /tmp/picks.json || true; }

          node - <<'NODE'
          const fs = require("fs");
          const cron = JSON.parse(fs.readFileSync("/tmp/cron.json","utf8"));
          let picksResp = {};
          try { picksResp = JSON.parse(fs.readFileSync("/tmp/picks.json","utf8")); } catch {}
          const picks = picksResp.picks ?? [];
          const q = cron.qualification ?? picksResp.qualification ?? {};
          const out = [];
          out.push(`# 조용한 돈 픽 — 프로덕션 실측 (${cron.date ?? picksResp.date ?? "?"})`);
          out.push("");
          out.push(`- 발행 픽: **${picks.length}장** (cron published=${cron.published ?? "?"}, ledgerAppended=${cron.ledgerAppended ?? "?"}, ${cron.ms ?? "?"}ms)`);
          out.push(`- 자격 로그: KR유니버스 ${q.krUniverse ?? "?"} · KR신호 ${q.krWithSignal ?? "?"} · US내부자원천 ${q.usInsiderRaw ?? "?"} · US신호 ${q.usWithSignal ?? "?"} · 조용함통과 ${q.afterQuiet ?? "?"} · 품질통과 ${q.afterQuality ?? "?"}`);
          out.push(`- 탈락 사유: ${JSON.stringify(q.drops ?? {})}`);
          out.push("");
          const dist = {};
          for (const p of picks) dist[p.signal?.kind] = (dist[p.signal?.kind]??0)+1;
          out.push(`## 신호 유형 분포`);
          out.push(Object.keys(dist).length ? Object.entries(dist).map(([k,v])=>`- ${k}: ${v}`).join("\n") : "- (없음)");
          out.push("");
          out.push(`## 픽 상세`);
          out.push("| # | 종목 | 시장 | 신호 | 주체·규모·일수 | 당일% | 현재가 | 훅 | 무효선 | 위원회 |");
          out.push("|---|---|---|---|---|---|---|---|---|---|");
          picks.forEach((p,i)=>{
            const s=p.signal??{}; const pr=p.price??{}; const c=p.conviction?.committee??{};
            out.push(`| ${i+1} | ${p.subject?.canonical??"?"} | ${p.subject?.market??"?"} | ${s.kind??"?"} | ${s.actors??"?"} ${s.scale??""} (${s.days??"?"}일) | ${pr.changePct??"?"} | ${pr.currentText??pr.current??"?"} | ${p.hook??"?"} | ${p.invalidation?.text??"?"} | ${c.verdict1line??"?"} (T${c.timingGrade??"?"}/V${c.valuationGrade??"?"}) |`);
          });
          out.push("");
          out.push("<details><summary>raw JSON</summary>\n\n```json\n"+JSON.stringify({cron, picks},null,2).slice(0,12000)+"\n```\n</details>");
          const md = out.join("\n");
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, md+"\n");
          console.log(md);
          NODE
