name: Vercel Production Deploy

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or SHA to deploy"
        required: false
        default: main
      backend_deployment:
        description: "Existing backend deployment URL to promote without creating a deployment"
        required: false
        default: ""
      backend_alias:
        description: "Alias target for an existing backend deployment (bypasses promotion limits)"
        required: false
        default: ""
      web_deployment:
        description: "Existing web deployment URL to promote without creating a deployment"
        required: false
        default: ""
      web_alias:
        description: "Alias target for an existing web deployment (bypasses promotion limits)"
        required: false
        default: ""
      bootstrap_ledger:
        description: "Apply and verify the append-only Judgment Ledger in the backend production database"
        required: false
        type: boolean
        default: false

concurrency:
  group: vercel-production-deploy
  cancel-in-progress: false

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_wfSGvSkBTXHZXDsG26LtLT1B
      VERCEL_PROJECT_ID: prj_B68xJxWVEbeZ0Y0McN8rSvZTjh9G
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || 'main' }}

      - name: Pull Vercel environment
        run: npx --yes vercel@latest pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Install dependencies for ledger bootstrap
        if: ${{ inputs.bootstrap_ledger }}
        run: npm ci

      - name: Bootstrap ledger in backend production database
        if: ${{ inputs.bootstrap_ledger }}
        shell: bash
        run: |
          set -a
          source .vercel/.env.production.local
          set +a
          : "${DATABASE_URL:?DATABASE_URL is missing from the backend production environment}"
          npx prisma db execute --file prisma/sql/2026-07-20_judgment_ledger.sql --schema prisma/schema.prisma
          npx tsx scripts/migrate-judgment-ledger.ts
          npx tsx scripts/materialize-ledger-outcomes.ts
          npx tsx scripts/verify-judgment-ledger-append-only.ts

      - name: Deploy with Vercel production runtime
        id: deploy_backend
        if: ${{ inputs.backend_deployment == '' }}
        shell: bash
        run: |
          deployment_url="$(npx --yes vercel@latest deploy --prod --token="${{ secrets.VERCEL_TOKEN }}")"
          printf '%s\n' "$deployment_url"
          echo "url=$(printf '%s\n' "$deployment_url" | tail -n 1)" >> "$GITHUB_OUTPUT"

      - name: Alias canonical backend domain
        if: ${{ inputs.backend_deployment == '' }}
        run: npx --yes vercel@latest alias set "${{ steps.deploy_backend.outputs.url }}" "fomo-club-backend.vercel.app" --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Promote existing deployment
        if: ${{ inputs.backend_deployment != '' && inputs.backend_alias == '' }}
        run: npx --yes vercel@latest promote "${{ inputs.backend_deployment }}" --yes --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Alias existing deployment
        if: ${{ inputs.backend_deployment != '' && inputs.backend_alias != '' }}
        run: npx --yes vercel@latest alias set "${{ inputs.backend_deployment }}" "${{ inputs.backend_alias }}" --token="${{ secrets.VERCEL_TOKEN }}"

  deploy-fomo-web:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_wfSGvSkBTXHZXDsG26LtLT1B
      VERCEL_PROJECT_ID: prj_dfwSKviFgdUg7MocHAqiBEPmaxcV
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || 'main' }}

      - name: Pull Vercel environment
        run: npx --yes vercel@latest pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy with Vercel production runtime
        id: deploy_web
        if: ${{ inputs.web_deployment == '' }}
        shell: bash
        run: |
          deployment_url="$(npx --yes vercel@latest deploy --prod --token="${{ secrets.VERCEL_TOKEN }}")"
          printf '%s\n' "$deployment_url"
          echo "url=$(printf '%s\n' "$deployment_url" | tail -n 1)" >> "$GITHUB_OUTPUT"

      - name: Alias canonical web domain
        if: ${{ inputs.web_deployment == '' }}
        run: npx --yes vercel@latest alias set "${{ steps.deploy_web.outputs.url }}" "fomo-web-mlender-ais-projects.vercel.app" --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Promote existing deployment
        if: ${{ inputs.web_deployment != '' && inputs.web_alias == '' }}
        run: npx --yes vercel@latest promote "${{ inputs.web_deployment }}" --yes --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Alias existing deployment
        if: ${{ inputs.web_deployment != '' && inputs.web_alias != '' }}
        run: npx --yes vercel@latest alias set "${{ inputs.web_deployment }}" "${{ inputs.web_alias }}" --token="${{ secrets.VERCEL_TOKEN }}"
