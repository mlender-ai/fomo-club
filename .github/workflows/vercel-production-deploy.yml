name: Vercel Production Deploy

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or SHA to deploy"
        required: false
        default: main

concurrency:
  group: vercel-production-deploy
  cancel-in-progress: false

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_wfSGvSkBTXHZXDsG26LtLT1B
      VERCEL_PROJECT_ID: prj_B68xJxWVEbeZ0Y0McN8rSvZTjh9G
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || 'main' }}

      - name: Pull Vercel environment
        run: npx --yes vercel@latest pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build production artifact
        run: npx --yes vercel@latest build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy production artifact
        run: npx --yes vercel@latest deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"

  deploy-fomo-web:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_wfSGvSkBTXHZXDsG26LtLT1B
      VERCEL_PROJECT_ID: prj_dfwSKviFgdUg7MocHAqiBEPmaxcV
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || 'main' }}

      - name: Pull Vercel environment
        run: npx --yes vercel@latest pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build production artifact
        run: npx --yes vercel@latest build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy production artifact
        run: npx --yes vercel@latest deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
